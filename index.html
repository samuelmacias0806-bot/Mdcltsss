<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDCLTS | Urban Minimalist</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 1. CONFIGURACIÓN DEL FONDO URBANO (Se mantiene igual) */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            background-image: url('https://i.ibb.co/rRD4nnXG/1773911755424.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Montserrat', sans-serif; /* Fuente base limpia */
            color: #000;
        }

        /* 2. NUEVO ESTILO DEL TÍTULO: MINIMALIST BOLD CURSIVE */
        header {
            padding: 60px 0 20px 0;
            text-align: center;
        }

        header h1 {
            font-family: 'Montserrat Alternates', sans-serif; /* La fuente especial */
            font-weight: 900; /* Lo más grueso (Black) */
            font-size: 4.5rem; /* Súper grande */
            margin: 0;
            letter-spacing: -2px; /* Letras más pegadas, estilo urbano */
            text-transform: uppercase; /* Todo en mayúsculas para más fuerza */
            /* Efecto sutil para resaltar sobre el grafiti */
            text-shadow: 2px 2px 0px #fff; 
        }

        /* 3. CONTENEDOR DE LA GUÍA DE TALLAS (Se mantiene igual) */
        .size-container {
            max-width: 600px;
            margin: 30px auto 50px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border: 2px solid #000;
            box-shadow: 10px 10px 0px #000;
            text-align: center;
        }

        .size-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .size-table th {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            background-color: #000;
            color: #fff;
            padding: 12px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .size-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-weight: 700;
        }

        .price-tag {
            font-size: 1.8rem;
            font-weight: 900;
            margin-top: 25px;
            display: block;
            font-family: 'Montserrat Alternates', sans-serif;
        }

        /* 4. BOTÓN FLOTANTE DE WHATSAPP (Se mantiene igual) */
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background-color: #25d366;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: transform 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .whatsapp-btn img {
            width: 35px;
            filter: brightness(0) invert(1);
        }

        /* NOTA DE PIE */
        .footer-note {
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-top: 20px;
            letter-spacing: 1.5px;
            color: #555;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <header>
        <h1>MDCLTS</h1>
    </header>

    <div class="size-container">
        <h3>GUÍA DE TALLAS</h3>
        <table class="size-table">
            <thead>
                <tr>
                    <th>Talla</th>
                    <th>Largo (cm)</th>
                    <th>Ancho (cm)</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>S</td><td>68</td><td>48</td></tr>
                <tr><td>M</td><td>70</td><td>51</td></tr>
                <tr><td>L</td><td>73</td><td>54</td></tr>
                <tr><td>XL</td><td>76</td><td>57</td></tr>
            </tbody>
        </table>
        <span class="price-tag">$89.990 COP</span>
        <p class="footer-note">Marcas: Nike • Hugo Boss • Clemont • Monastery</p>
    </div>

    <a href="https://wa.me/573018942801?text=Hola%20MDCLTS!%20Me%20interesa%20una%20camiseta%20de%20$89.990" class="whatsapp-btn" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

</body>
</html>
