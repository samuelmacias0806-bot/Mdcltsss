<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDCLTS | Premium Store</title>
    <style>
        :root {
            --fondo: #2c2c2c; /* Gris oscuro profesional */
            --tarjeta: #1e1e1e;
            --acento: #25d366;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--fondo);
            color: white;
            margin: 0;
            padding: 0;
        }

        /* --- MENÚ LATERAL (HAMBURGUESA) --- */
        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 5px;
        }

        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1001;
            top: 0;
            right: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 20px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover { color: white; }

        .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
        }

        /* --- CABECERA Y MÚSICA --- */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        #logo { max-width: 180px; }

        .music-player {
            margin: 10px 0;
            background: #111;
            padding: 10px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* --- PRODUCTOS (VERTICALES Y GRANDES) --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .producto {
            background-color: var(--tarjeta);
            border-radius: 0px; /* Estilo cuadrado vertical más moderno */
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .producto img {
            width: 100%;
            height: 500px; /* Vertical y grande */
            object-fit: cover;
        }

        .info {
            padding: 20px;
            text-align: center;
        }

        .precio {
            font-size: 1.4em;
            color: var(--acento);
            font-weight: bold;
        }

        .whatsapp-button {
            display: block;
            background: var(--acento);
            color: black;
            text-decoration: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="#">NIKE</a>
        <a href="#">HUGO BOSS</a>
        <a href="#">CLEMONT</a>
        <a href="#">MONASTERY</a>
    </div>

    <span class="menu-btn" onclick="openNav()">&#9776;</span>

    <header>
        <img src="https://i.ibb.co/bgL4xQ9Z/1773899219442.png" alt="MDCLTS Logo" id="logo">
        <br>
        <div class="music-player">
            <span>🎵 Música</span>
            <audio id="bgMusic" loop>
                <source src="musica.mp3" type="audio/mpeg">
            </audio>
            <button onclick="toggleMusic()" id="musicBtn" style="cursor:pointer; border:none; background:var(--acento); border-radius:20px; padding:5px 15px;">PLAY</button>
        </div>
    </header>

    <div class="container">
        <div class="producto" id="nike">
            <img src="https://i.ibb.co/PsqGzYpk/IMG-20260223-WA0001.jpg" alt="Nike Urban Light">
            <div class="info">
                <h2>NIKE URBAN LIGHT</h2>
                <p class="precio">$89.990 COP</p>
                <a href="https://wa.me/XXXXXXXXXXX?text=Me%20interesa%20la%20Nike%20Urban" class="whatsapp-button">Comprar</a>
            </div>
        </div>

        </div>

    <script>
        function openNav() { document.getElementById("mySidenav").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

        var music = document.getElementById("bgMusic");
        function toggleMusic() {
            if (music.paused) {
                music.play();
                document.getElementById("musicBtn").innerHTML = "MUTE";
            } else {
                music.pause();
                document.getElementById("musicBtn").innerHTML = "PLAY";
            }
        }
    </script>

</body>
</html>
