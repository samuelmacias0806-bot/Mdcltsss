<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDCLTS | Tienda Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            /* FONTO ACTUALIZADO */
            background-image: url('https://i.ibb.co/pvWW7TWH/1773920823184.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #000000;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* Capa ligera para que el fondo no sature visualmente */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4); /* Ajusta este 0.4 si quieres más o menos transparencia */
            z-index: -1;
        }

        /* --- MENÚ --- */
        .menu-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1001;
            top: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.95);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        .sidenav a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 20px;
            color: #333;
            display: block;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- HEADER --- */
        header { 
            text-align: center; 
            padding: 80px 20px 40px 20px; 
        }
        
        .header-title {
            font-family: 'Playball', cursive;
            font-size: 5em;
            color: #000;
            margin: 0;
            text-shadow: 2px 2px 0px #fff; /* Sombra blanca para resaltar sobre el grafiti */
        }

        /* --- SECCIONES --- */
        .section-title {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            margin-top: 40px;
            letter-spacing: 8px;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- GRID DE PRODUCTOS --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.9); /* Fondo blanco traslúcido */
            border: 1px solid #eee;
            border-radius: 15px; /* Bordes redondeados más modernos */
            text-align: center;
            padding-bottom: 30px;
            transition: 0.3s;
            backdrop-filter: blur(5px); /* Efecto de desenfoque detrás de la tarjeta */
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card:hover { 
            transform: translateY(-10px);
            border-color: #000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .img-box {
            width: 100%;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #fff;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .price { 
            font-size: 1.5em; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #000;
        }
        
        .btn-wa {
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 12px 35px;
            font-weight: bold;
            display: inline-block;
            text-transform: uppercase;
            font-size: 0.8em;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-wa:hover {
            background: #333;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .header-title { font-size: 3.5em; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" onclick="closeNav()" style="font-size:30px;">&times;</a>
        <a href="#nike" onclick="closeNav()">NIKE</a>
        <a href="#boss" onclick="closeNav()">HUGO BOSS</a>
        <a href="#clemont" onclick="closeNav()">CLEMONT</a>
        <a href="#monastery" onclick="closeNav()">MONASTERY</a>
    </div>

    <div class="menu-btn" onclick="openNav()">MARCAS ☰</div>

    <header>
        <h1 class="header-title">MDCLTS</h1>
    </header>

    <div id="nike" class="section-title">NIKE</div>
    <div class="container">
        <div class="card">
            <div class="img-box"><img src="https://i.ibb.co/PsqGzYpk/IMG-20260223-WA0001.jpg"></div>
            <h3>NIKE URBAN LIGHT</h3>
            <p class="price">$89.990</p>
            <a href="https://wa.me/573018942801?text=Hola,%20me%20interesa%20la%20Nike%20Urban%20Light" class="btn-wa">COMPRAR</a>
        </div>
        <div class="card">
            <div class="img-box"><img src="https://i.ibb.co/WvrqtY3H/IMG-20260318-WA0147.jpg"></div>
            <h3>NIKE SILHOUETTE</h3>
            <p class="price">$89.990</p>
            <a href="https://wa.me/573018942801?text=Hola,%20me%20interesa%20la%20Nike%20Silhouette" class="btn-wa">COMPRAR</a>
        </div>
    </div>

    <div id="boss" class="section-title">HUGO BOSS</div>
    <div class="container">
        <div class="card">
            <div class="img-box"><img src="https://i.ibb.co/7JktqhHC/IMG-20260318-WA0146.jpg"></div>
            <h3>HUGO BOSS RED</h3>
            <p class="price">$89.990</p>
            <a href="https://wa.me/573018942801?text=Hola,%20me%20interesa%20la%20Hugo%20Boss%20Red" class="btn-wa">COMPRAR</a>
        </div>
    </div>

    <div id="clemont" class="section-title">CLEMONT</div>
    <div class="container">
        <div class="card">
            <div class="img-box"><img src="https://i.ibb.co/Y4v51Sq4/IMG-20260318-WA0142.jpg"></div>
            <h3>VERITA ETERNA</h3>
            <p class="price">$89.990</p>
            <a href="https://wa.me/573018942801?text=Hola,%20me%20interesa%20la%20Verita%20Eterna" class="btn-wa">COMPRAR</a>
        </div>
        <div class="card">
            <div class="img-box"><img src="https://i.ibb.co/N6r0DNsb/IMG-20260318-WA0139.jpg"></div>
            <h3>HEART FLAME</h3>
            <p class="price">$89.990</p>
            <a href="https://wa.me/573018942801?text=Hola,%20me%20interesa%20la%20Heart%20Flame" class="btn-wa">COMPRAR</a>
        </div>
    </div>

    <div id="monastery" class="section-title">MONASTERY</div>
    <div class="container">
        <div class="card">
            <div class="img-box"><img src="https://i.ibb.co/SwmwRN9D/IMG-20260306-WA0130.jpg"></div>
            <h3>MONASTERY BLACK</h3>
            <p class="price">$89.990</p>
            <a href="https://wa.me/573018942801?text=Hola,%20me%20interesa%20la%20Monastery%20Black" class="btn-wa">COMPRAR</a>
        </div>
    </div>

    <script>
        function openNav() { document.getElementById("mySidenav").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    </script>
</body>
</html>
